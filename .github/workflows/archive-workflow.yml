name: Archive Build (Chronological)

on:
  push:
    branches:
      - archive
  workflow_dispatch:
    inputs:
      start_date:
        description: "Earliest commit date to include (inclusive), format YYYY-MM-DD"
        required: false
        default: "2026-05-28"
      end_date:
        description: "Latest commit date to include (inclusive), format YYYY-MM-DD"
        required: false
        default: "2026-05-30"

concurrency:
  group: archive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-commit-list:
    runs-on: ubuntu-latest
    outputs:
      commits-json: ${{ steps.commits.outputs.commits_json }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: commits
        name: Generate commit list (author-date range)
        shell: bash
        env:
          START_DATE: ${{ inputs.start_date || '2026-05-28' }}
          END_DATE: ${{ inputs.end_date || '2026-05-30' }}
        run: |
          set -euo pipefail

          start_epoch=$(date -d "$START_DATE 00:00:00" +%s)
          end_epoch=$(date -d "$END_DATE 23:59:59" +%s)

          commits_tsv=$(git log --all --date-order --format='%at\t%H\t%aI\t%s')
          commits_filtered=$(printf '%s\n' "$commits_tsv" | awk -F'\t' -v s="$start_epoch" -v e="$end_epoch" '($1>=s && $1<=e){print $0}')

          commits_sorted=$(printf '%s\n' "$commits_filtered" | awk -F'\t' '{print $1"\t"$0}' | sort -t $'\t' -k1,1n | cut -f2-)

          echo "DEBUG commits_filtered_lines=$(printf '%s\n' \"$commits_filtered\" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')" >> "$GITHUB_STEP_SUMMARY"
          echo "DEBUG commits_sorted_lines=$(printf '%s\n' \"$commits_sorted\" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$commits_sorted" ]; then
            commits_json='[]'
          else
            raw_json_lines="$(
              printf '%s\n' "$commits_sorted" | awk -F'\t' '
                {
                  epoch=$1; hash=$2; date=$3;
                  subject=$4;
                  for (i=5; i<=NF; i++) subject=subject "\t" $i;

                  if (epoch=="" || hash=="" || date=="") next;

                  clean_date=substr(date,1,10);

                  gsub(/\r/," ",subject);
                  gsub(/\n/," ",subject);
                  gsub(/\t/," ",subject);
                  gsub(/"/,"\\\"",subject);

                  print "{\"epoch\":" epoch \",\"hash\":\"" hash "\",\"date\":\"" clean_date "\",\"subject\":\"" subject "\"}";
                }'
            )"

            echo "DEBUG raw_json_lines_count=$(printf '%s\n' \"$raw_json_lines\" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')" >> "$GITHUB_STEP_SUMMARY"

            commits_json="$(printf '%s\n' "$raw_json_lines" | jq -s -c '.')"
          fi

          echo "DEBUG commits_json_type=$(echo \"$commits_json\" | jq -r 'type' 2>/dev/null || echo 'parse_error')" >> "$GITHUB_STEP_SUMMARY"
          echo "DEBUG commits_json_len=$(echo \"$commits_json\" | jq -r 'length' 2>/dev/null || echo 'parse_error')" >> "$GITHUB_STEP_SUMMARY"

          echo "DEBUG first_commit_dates:" >> "$GITHUB_STEP_SUMMARY"
          echo "$commits_json" | jq -r '.[].date' | head -n 5 >> "$GITHUB_STEP_SUMMARY" || true

          echo "DEBUG first_commit_hashes:" >> "$GITHUB_STEP_SUMMARY"
          echo "$commits_json" | jq -r '.[].hash' | head -n 5 >> "$GITHUB_STEP_SUMMARY" || true

          echo "commits_json=$commits_json" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: generate-commit-list
    runs-on: ubuntu-latest
    if: ${{ needs.generate-commit-list.outputs.commits-json != '' && needs.generate-commit-list.outputs.commits-json != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.generate-commit-list.outputs.commits-json) }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ matrix.commit.hash }}

      - name: Resolve SDK versions based on commit date (table)
        id: versions
        shell: bash
        env:
          SDK_DATE_MAP: |
            2026-01-01|9999-12-31|v3.1-branch|0.17.4
            2025-07-01|2025-12-31|v3.1-branch|0.17.4
            2025-02-01|2025-06-30|v3.1-branch|0.17.4
            2000-01-01|2025-01-31|v3.1-branch|0.17.4
        run: |
          set -euo pipefail

          commit_date='${{ matrix.commit.date }}'
          commit_hash='${{ matrix.commit.hash }}'

          if [ -z "$commit_date" ]; then
            {
              echo "ERROR: matrix.commit.date is empty"
              echo "DEBUG: matrix.commit=${{ toJson(matrix.commit) }}"
              echo "DEBUG: SDK_DATE_MAP=\"$SDK_DATE_MAP\""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          zephyr_sdk_version=""
          nrfconnect_revision=""

          while IFS='|' read -r from_date to_date nrf_rev zsdk_ver; do
            [ -z "$from_date" ] && continue

            if [[ "$commit_date" >= "$from_date" && "$commit_date" <= "$to_date" ]]; then
              nrfconnect_revision="$nrf_rev"
              zephyr_sdk_version="$zsdk_ver"
              break
            fi
          done <<< "$SDK_DATE_MAP"

          if [ -z "$zephyr_sdk_version" ] || [ -z "$nrfconnect_revision" ]; then
            {
              echo "ERROR: No SDK_DATE_MAP match for commit_date=$commit_date"
              echo "ERROR: SDK_DATE_MAP=\"$SDK_DATE_MAP\""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "zephyr_sdk_version=$zephyr_sdk_version" >> "$GITHUB_OUTPUT"
          echo "nrfconnect_revision=$nrfconnect_revision" >> "$GITHUB_OUTPUT"

      - name: Patch west.yml for nRF-Connect SDK revision
        shell: bash
        env:
          REV: ${{ steps.versions.outputs.nrfconnect_revision }}
        run: |
          set -euo pipefail
          sed -i -E "s/(^\s*-\s*name:\s*sdk-nrf[\s\S]*?\n\s*revision:\s*).*/\1\"$REV\"/" west.yml || true
          sed -i -E "s/^\s*revision:\s*.*$/  revision: \"$REV\"/" west.yml || true

      - name: Cache + Install Apt Dependencies
        id: cache-apt
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v6.1.0
        with:
          path: ~/zephyr-sdk-${{ steps.versions.outputs.zephyr_sdk_version }}
          key: zephyr-sdk-${{ steps.versions.outputs.zephyr_sdk_version }}

      - name: Install Zephyr SDK
        id: install-sdk
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ steps.versions.outputs.zephyr_sdk_version }}/zephyr-sdk-${{ steps.versions.outputs.zephyr_sdk_version }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${{ steps.versions.outputs.zephyr_sdk_version }}_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-${{ steps.versions.outputs.zephyr_sdk_version }}/setup.sh -c -t arm-zephyr-eabi

      - name: Initialize Zephyr Workspace
        id: init-west
        run: |
          set -euo pipefail
          echo "$HOME/.venv/bin" >> $GITHUB_PATH
          export PATH="$HOME/.venv/bin:$PATH"
          cd zephyr-workspace
          if [ ! -d ".west" ]; then
            west init -l SlimeNRF-CI
          fi
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Setup Python venv + West
        id: setup-venv
        run: |
          set -euo pipefail
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install west ninja

      - name: Cache PIP Requirements
        id: cache-pip
        uses: actions/cache@v6.1.0
        with:
          path: ~/.venv
          key: venv-pip-${{ steps.versions.outputs.zephyr_sdk_version }}

      - name: Install Zephyr Python Requirements
        id: install-pip
        run: |
          set -euo pipefail
          cd zephyr-workspace
          ~/.venv/bin/pip install -r zephyr/scripts/requirements.txt

      - name: Cache West Workspace
        id: cache-west
        uses: actions/cache@v6.1.0
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
            zephyr-workspace/bootloader
            zephyr-workspace/tools
          key: west-workspace-${{ steps.versions.outputs.nrfconnect_revision }}

      - name: Cache Repository
        id: cache-repository
        uses: actions/cache@v6.1.0
        with:
          path: zephyr-workspace/SlimeVR-Tracker-nRF
          key: firmware-${{ matrix.commit.hash }}

      - name: Clone Repository
        id: clone-repository
        if: steps.cache-repository.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd zephyr-workspace
          rm -rf SlimeVR-Tracker-nRF
          git clone --filter=blob:none --no-checkout "${{ github.server_url }}/${{ github.repository }}.git" SlimeVR-Tracker-nRF
          git -C SlimeVR-Tracker-nRF fetch --depth=1 origin "${{ matrix.commit.hash }}"
          git -C SlimeVR-Tracker-nRF checkout "${{ matrix.commit.hash }}"
          git -C SlimeVR-Tracker-nRF submodule update --init --recursive --depth 1

      - name: 📥 Clone Custom Boards Repository
        id: clone-custom
        run: |
          cd zephyr-workspace
          sudo rm -rf custom
          git clone --single-branch -b custom https://github.com/Shine-Bright-Meow/SlimeNRF-Tracker.git custom

      - name: 🔧 Board Adjustments
        id: board-adjustments
        shell: bash
        run: |
          sed -i 's/^#CONFIG_NRFX_TIMER1=y/CONFIG_NRFX_TIMER1=y/' SlimeVR-Tracker-nRF/prj.conf
          sed -i 's|^[[:space:]]*//[[:space:]]*\(IRQ_DIRECT_CONNECT(TIMER1_IRQn.*\)|\1|' SlimeVR-Tracker-nRF/src/connection/timer.c
          sed -i 's|^[[:space:]]*//[[:space:]]*\(irq_enable(TIMER1_IRQn.*\)|\1|' SlimeVR-Tracker-nRF/src/connection/timer.c

          sed -i '/^[[:space:]]*#define[[:space:]]*DFU_EXISTS[[:space:]]*CONFIG_BUILD_OUTPUT_UF2[[:space:]]*||[[:space:]]*CONFIG_BOARD_HAS_NRF5_BOOTLOADER/i #include <zephyr/drivers/gpio.h>\n#define ZEPHYR_USER_NODE DT_PATH(zephyr_user)\n#if DT_NODE_HAS_PROP(ZEPHYR_USER_NODE, pwr_gpios)\nstatic const struct gpio_dt_spec pwr = GPIO_DT_SPEC_GET(ZEPHYR_USER_NODE, pwr_gpios);\n#endif\n#if DT_NODE_HAS_PROP(ZEPHYR_USER_NODE, gnd_gpios)\nstatic const struct gpio_dt_spec gnd = GPIO_DT_SPEC_GET(ZEPHYR_USER_NODE, gnd_gpios);\n#endif' SlimeVR-Tracker-nRF/src/main.c

          sed -i '/^[[:space:]]*#ifdef[[:space:]]*NRF_RESET/i #if DT_NODE_HAS_PROP(ZEPHYR_USER_NODE, pwr_gpios)\n    gpio_pin_configure_dt(&pwr, GPIO_OUTPUT_ACTIVE);\n    gpio_pin_set_dt(&pwr, 1);\n#endif\n#if DT_NODE_HAS_PROP(ZEPHYR_USER_NODE, gnd_gpios)\n    gpio_pin_configure_dt(&gnd, GPIO_OUTPUT_ACTIVE);\n    gpio_pin_set_dt(&gnd, 0);\n#endif' SlimeVR-Tracker-nRF/src/main.c
          cp -rT custom/stacked SlimeVR-Tracker-nRF

          sed -i '/^[[:space:]]*nrf_gpio_cfg(NRF_GPIO_PIN_MAP(0, 13)/ s/NRF_GPIO_PIN_PULLDOWN/NRF_GPIO_PIN_PULLUP/' SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/board.c

      - name: Build SlimeVR-Tracker-nRF (boards matrix)
        id: build-firmware
        run: |
          boards=(
            "promicro_uf2/nrf52840/i2c uf2 SlimeNRF_ProMicro_I2C_Tracker"
            "promicro_uf2/nrf52840/spi uf2 SlimeNRF_ProMicro_SPI_Tracker"
          )

          cd zephyr-workspace
          sudo rm -rf Releases
          mkdir -p Releases

          for b in "${boards[@]}"; do
            boardname=$(echo "$b" | awk '{print $1}')
            fileformat=$(echo "$b" | awk '{print $2}')
            filename=$(echo "$b" | awk '{print $3}')

            rm -rf "SlimeVR-Tracker-nRF/build" || true

            sed -i "/printk(FW_STRING);/a printk(\"Repo: ${{ github.repository }}@${{ github.ref_name }} | SDK: ${{ steps.versions.outputs.nrfconnect_revision }}\\n\");" SlimeVR-Tracker-nRF/src/console.c

            west build \
              --board "$boardname" \
              --pristine=always "SlimeVR-Tracker-nRF" \
              --build-dir "SlimeVR-Tracker-nRF/build" \
              -- \
              -DNCS_TOOLCHAIN_VERSION=NONE \
              -DBOARD_ROOT=../"SlimeVR-Tracker-nRF"

            mv SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr."$fileformat" "Releases/${filename}.""$fileformat"
          done

      - name: Upload workflow artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Releases-${{ matrix.commit.hash }}
          if-no-files-found: warn
          path: zephyr-workspace/Releases

      - name: Create/Update GitHub Release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_DATE: ${{ matrix.commit.date }}
          COMMIT_HASH: ${{ matrix.commit.hash }}
          COMMIT_SUBJECT: ${{ matrix.commit.subject }}
        run: |
          set -euo pipefail

          tag="$COMMIT_HASH"
          short_hash="$(echo "$COMMIT_HASH" | cut -c1-7)"
          title="$short_hash - $COMMIT_SUBJECT"

          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}"

          description="Built by Archiving Workflow\n${COMMIT_SUBJECT}"

          if curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" "${api}/releases/tags/${tag}" > /dev/null; then
            echo "Release exists; updating (title/description)"
          else
            echo "Release does not exist; creating"
          fi

          release_payload=$(jq -n \
            --arg tag "$tag" \
            --arg name "$title" \
            --arg body "$description" \
            '{ tag_name: $tag, name: $name, body: $body, draft: false, prerelease: true, generate_release_notes: false }')

          release_id=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" "${api}/releases/tags/${tag}" | jq -r '.id // empty') || true
          if [ -n "$release_id" ]; then
            curl -sS -X PATCH -H "Authorization: Bearer ${GH_TOKEN}" -H "Content-Type: application/json" \
              -d "$release_payload" "${api}/releases/${release_id}" > /dev/null
          else
            curl -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Content-Type: application/json" \
              -d "$release_payload" "${api}/releases" > /dev/null
          fi

          assets_dir="zephyr-workspace/Releases"
          if [ ! -d "${assets_dir}" ]; then
            echo "ERROR: assets dir not found: ${assets_dir}" >&2
            exit 1
          fi

          for f in "${assets_dir}"/*; do
            [ -e "$f" ] || continue
            asset_name=$(basename "$f")

            rel_json=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" "${api}/releases/tags/${tag}")
            upload_url=$(echo "$rel_json" | jq -r '.upload_url' | sed -e 's/{?name,label}//')

            existing_asset_id=$(echo "$rel_json" | jq -r '.assets[]? | select(.name=="'"'${asset_name}'"'") | .id' | head -n 1)
            if [ -n "$existing_asset_id" ]; then
              curl -sS -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" "${api}/releases/assets/${existing_asset_id}" > /dev/null
            fi

            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "$f" \
              "${upload_url}?name=${asset_name}" > /dev/null
          done

